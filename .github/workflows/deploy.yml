name: Deploy to GitHub Pages

on:
  push:
    branches: [main, version-6-build]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - id: production-build
        run: npm run build
      - name: Mark successful build
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref === 'refs/heads/main' ? 'heads/built-v6' : 'heads/built-v6-candidate';
            try {
              await github.rest.git.updateRef({ owner, repo, ref, sha: context.sha, force: true });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
              await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha: context.sha });
            }
      - name: Mark failed build
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref === 'refs/heads/main' ? 'heads/failed-v6' : 'heads/failed-v6-candidate';
            try {
              await github.rest.git.updateRef({ owner, repo, ref, sha: context.sha, force: true });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
              await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha: context.sha });
            }
      - uses: actions/configure-pages@v5
        if: success() && github.ref == 'refs/heads/main'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        if: success() && github.ref == 'refs/heads/main'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Mark successful deployment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = 'heads/deployed-v6';
            try {
              await github.rest.git.updateRef({ owner, repo, ref, sha: context.sha, force: true });
            } catch (error) {
              if (error.status !== 404 && error.status !== 422) throw error;
              await github.rest.git.createRef({ owner, repo, ref: `refs/${ref}`, sha: context.sha });
            }
